---
dependency:
  name: galaxy
  enabled: false

driver:
  name: docker

platforms:
  - name: instance-ubuntu
    dockerfile: 24.04.Dockerfile
    image: molecule-vector-ubuntu:24.04
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /tmp
      - /run
      - /run/lock
  
  - name: instance-debian
    dockerfile: 13.Dockerfile
    image: molecule-vector-debian:13
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /tmp
      - /run
      - /run/lock

provisioner:
  name: ansible
  ansible_args:
    - --skip-tags=service,verify
  inventory:
    host_vars:
      instance-ubuntu:
        ansible_connection: community.docker.docker
        ansible_user: root
        ansible_python_interpreter: /usr/bin/python3
      instance-debian:
        ansible_connection: community.docker.docker
        ansible_user: root
        ansible_python_interpreter: /usr/bin/python3
verifier:
  name: ansible
lint: |
  set -e
  yamllint .
  ansible-lint
...
